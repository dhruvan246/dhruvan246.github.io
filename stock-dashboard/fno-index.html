<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NSE F&amp;O Dashboard</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1a1a1a;
    background: #ffffff;
    font-size: 13px;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px 20px 12px;
    border-bottom: 1px solid #e5e7eb;
    background: #fafbfc;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .meta {
    color: #6b7280;
    font-size: 12px;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  #search {
    flex: 1;
    max-width: 280px;
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  #search:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
  .pill {
    background: #eef2ff;
    color: #3730a3;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .table-wrap { padding: 0 20px 20px; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }
  thead th {
    position: sticky;
    top: 49px;
    background: #f9fafb;
    text-align: right;
    font-weight: 600;
    font-size: 11px;
    color: #4b5563;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 10px 10px;
    border-bottom: 2px solid #e5e7eb;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  thead th:hover { background: #f3f4f6; color: #111827; }
  thead th .arrow { display: inline-block; width: 10px; opacity: 0.4; margin-left: 3px; }
  thead th.sorted .arrow { opacity: 1; color: #2563eb; }
  tbody td {
    padding: 7px 10px;
    border-bottom: 1px solid #f3f4f6;
    text-align: right;
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; font-weight: 600; color: #111827; }
  tbody tr:hover { background: #f9fafb; }
  .pos { color: #047857; }
  .neg { color: #b91c1c; }
  .zero { color: #6b7280; }
  .strong-pos { color: #047857; font-weight: 600; }
  .strong-neg { color: #b91c1c; font-weight: 600; }
  .na { color: #9ca3af; }
  .footer {
    padding: 12px 20px;
    color: #6b7280;
    font-size: 11px;
    border-top: 1px solid #f3f4f6;
  }
  .loading, .error {
    padding: 40px 20px;
    text-align: center;
    color: #6b7280;
  }
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #f1f5f9;
    color: #334155;
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
    margin-right: 8px;
    transition: background 120ms;
  }
  .nav-link:hover { background: #e2e8f0; color: #0f172a; }
  .nav-link svg { width: 10px; height: 10px; }
  .error { color: #b91c1c; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>NSE F&amp;O Dashboard</h1>
    <div class="meta" id="meta">Loading&hellip;</div>
  </div>
  <div style="display:flex;align-items:center"><a href="https://dhruvan246.github.io/stocks-dashboard/" class="nav-link" title="Open Cash-market dashboard (NSE+BSE 1996+ history)">&larr; Cash market<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>
    <span class="pill" id="count-pill">…</span>
  </div>
</div>

<div class="toolbar">
  <input id="search" type="search" placeholder="Filter by symbol&hellip;" disabled />
  <span class="meta" id="filter-info"></span>
</div>

<div class="table-wrap">
<table id="grid">
  <thead>
    <tr>
      <th data-key="s" data-type="str">Symbol<span class="arrow"></span></th>
      <th data-key="p" data-type="num">Price (&#8377;)<span class="arrow"></span></th>
      <th data-key="m" data-type="num">M-Cap (&#8377; Cr)<span class="arrow"></span></th>
      <th data-key="d1" data-type="num">1D %<span class="arrow"></span></th>
      <th data-key="w1" data-type="num">1W %<span class="arrow"></span></th>
      <th data-key="m1" data-type="num">1M %<span class="arrow"></span></th>
      <th data-key="y1" data-type="num">1Y %<span class="arrow"></span></th>
      <th data-key="h" data-type="num">From 52W High %<span class="arrow"></span></th>
    </tr>
  </thead>
  <tbody id="body">
    <tr><td colspan="8" class="loading">Loading snapshot&hellip;</td></tr>
  </tbody>
</table>
</div>

<div class="footer" id="footer"></div>

<script>
function fmtPrice(v) {
  if (v == null) return '<span class="na">—</span>';
  return v.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtMcap(v) {
  if (v == null) return '<span class="na">—</span>';
  return Math.round(v).toLocaleString('en-IN');
}
function fmtPct(v) {
  if (v == null) return '<span class="na">—</span>';
  let cls = 'zero';
  if (v > 0.001) cls = Math.abs(v) >= 5 ? 'strong-pos' : 'pos';
  else if (v < -0.001) cls = Math.abs(v) >= 5 ? 'strong-neg' : 'neg';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}
function fmt52wHigh(v) {
  if (v == null) return '<span class="na">—</span>';
  let cls = 'neg';
  if (v >= -2) cls = 'strong-pos';
  else if (v >= -10) cls = 'pos';
  else if (v <= -30) cls = 'strong-neg';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}

let SNAP = null;
let rows = [];
let sortKey = 'd1';
let sortDir = 'desc';
let sortType = 'num';

function compare(a, b) {
  const av = a[sortKey], bv = b[sortKey];
  if (av == null && bv == null) return 0;
  if (av == null) return 1;
  if (bv == null) return -1;
  if (sortType === 'str') {
    const r = av.localeCompare(bv);
    return sortDir === 'asc' ? r : -r;
  }
  return sortDir === 'asc' ? av - bv : bv - av;
}

function render() {
  const filter = document.getElementById('search').value.trim().toUpperCase();
  let data = rows.slice();
  if (filter) data = data.filter(r => r.s.includes(filter));
  data.sort(compare);

  const body = document.getElementById('body');
  body.innerHTML = data.map(r => `<tr>
    <td>${r.s}</td>
    <td>${fmtPrice(r.p)}</td>
    <td>${fmtMcap(r.m)}</td>
    <td>${fmtPct(r.d1)}</td>
    <td>${fmtPct(r.w1)}</td>
    <td>${fmtPct(r.m1)}</td>
    <td>${fmtPct(r.y1)}</td>
    <td>${fmt52wHigh(r.h)}</td>
  </tr>`).join('');

  document.getElementById('count-pill').textContent = `${data.length} stocks`;
  document.getElementById('filter-info').textContent = filter
    ? `(filtered from ${rows.length})`
    : '';
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.key === sortKey);
    const arrow = th.querySelector('.arrow');
    arrow.textContent = th.dataset.key === sortKey
      ? (sortDir === 'asc' ? '▲' : '▼')
      : '↕';
  });
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    const type = th.dataset.type || 'num';
    if (sortKey === key) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortKey = key;
      sortType = type;
      sortDir = type === 'str' ? 'asc' : 'desc';
    }
    render();
  });
});

document.getElementById('search').addEventListener('input', render);

// Add a cache-buster so the freshly committed JSON is picked up immediately.
fetch('snapshot.json?t=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(snap => {
    SNAP = snap;
    rows = snap.rows.slice();
    const fetched = new Date(snap.fetched_at);
    const fetchedStr = fetched.toLocaleString('en-IN', {
      dateStyle: 'medium', timeStyle: 'short', timeZone: 'Asia/Kolkata'
    });
    document.getElementById('meta').textContent =
      `Snapshot from Yahoo Finance · ${fetchedStr} IST`;
    document.getElementById('search').disabled = false;
    document.getElementById('footer').innerHTML =
      `Market caps in &#8377; crores. Returns are based on daily close. ` +
      `52-week high computed from last ~252 trading days. ` +
      `Click any column header to sort; click again to toggle direction. ` +
      `Auto-refreshed daily by GitHub Actions after Indian market close.`;
    render();
  })
  .catch(err => {
    document.getElementById('body').innerHTML =
      `<tr><td colspan="8" class="error">Failed to load snapshot.json — ${err.message}</td></tr>`;
    document.getElementById('meta').textContent = 'Error loading data';
  });
</script>
</body>
</html>
